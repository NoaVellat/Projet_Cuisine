# CI : formalise le smoke test manuel — build de prod + audit des dépendances
# à chaque push. (Le modèle GLB est committé, pas besoin de Blender ici.)
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm audit --audit-level=moderate
